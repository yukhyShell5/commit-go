# .github/workflows/release.yml
name: Release commit-go

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Permet de lancer manuellement depuis l'onglet Actions

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Ajuste si tu utilises une version plus récente

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # Le token magique fourni par GitHub pour publier la release
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
